name: 아파트 실거래가 알림

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pyyaml xmltodict

      - name: 실거래가 조회 및 알림 발송
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
        run: python main.py

      - name: seen.json 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen.json"
          git push
